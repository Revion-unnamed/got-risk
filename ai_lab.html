<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>AI Evolution Lab — RISK: GoT</title>
  <style>
    :root {
      --bg:      #1a1612;
      --surface: #241e18;
      --surf2:   #2e2720;
      --border:  #4a3f30;
      --text:    #e8dcc8;
      --muted:   #9e8e78;
      --gold:    #c9a84c;
      --gold-dk: #8a6f2e;
      --danger:  #c0392b;
      --success: #27ae60;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: var(--bg); color: var(--text);
      font-family: system-ui, sans-serif; font-size: 14px;
      min-height: 100vh; padding: 16px;
    }
    h1 { color: var(--gold); font-size: 1.4rem; margin-bottom: 4px; }
    h2 { color: var(--gold); font-size: 1rem; margin: 16px 0 8px; }
    p.sub { color: var(--muted); font-size: 0.8rem; margin-bottom: 16px; }
    .card {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 8px; padding: 12px; margin-bottom: 12px;
    }
    .btn {
      display: inline-flex; align-items: center; justify-content: center;
      padding: 10px 20px; border: 1px solid var(--gold-dk);
      background: var(--gold-dk); color: var(--text); border-radius: 6px;
      font-size: 0.9rem; font-weight: 600; cursor: pointer; min-height: 40px;
    }
    .btn:hover { background: var(--gold); color: var(--bg); }
    .btn:disabled { opacity: 0.4; cursor: not-allowed; }
    .btn-danger { border-color: var(--danger); background: var(--danger); }
    .btn-sm { padding: 6px 12px; font-size: 0.8rem; min-height: 32px; }
    .row { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 8px; }
    .stat-grid {
      display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px;
      margin-bottom: 8px;
    }
    .stat { background: var(--surf2); border-radius: 6px; padding: 8px; text-align: center; }
    .stat-val { font-size: 1.4rem; font-weight: 700; color: var(--gold); }
    .stat-lbl { font-size: 0.7rem; color: var(--muted); margin-top: 2px; }
    .param-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
    .param-item { background: var(--surf2); border-radius: 6px; padding: 8px; }
    .param-name { font-size: 0.7rem; color: var(--muted); margin-bottom: 2px; }
    .param-val  { font-size: 1rem; font-weight: 700; color: var(--gold); }
    .param-group { font-size: 0.65rem; color: var(--gold); opacity: 0.6;
                   text-transform: uppercase; letter-spacing: 0.06em;
                   margin: 10px 0 4px; grid-column: 1/-1; }
    .log-box {
      background: var(--bg); border: 1px solid var(--border); border-radius: 6px;
      padding: 8px; height: 200px; overflow-y: auto;
      font-size: 0.75rem; color: var(--muted); font-family: monospace;
    }
    .log-box p { padding: 1px 0; border-bottom: 1px solid rgba(74,63,48,0.2); }
    .log-win  { color: var(--gold); font-weight: 700; }
    .log-info { color: #6ab0d4; }
    .log-mut  { color: #a0c878; }
    .log-score { color: #d4a0c8; }
    .gen-table { width: 100%; border-collapse: collapse; font-size: 0.72rem; }
    .gen-table th { color: var(--muted); font-weight: 600; padding: 3px 5px;
                    border-bottom: 1px solid var(--border); text-align: left; }
    .gen-table td { padding: 3px 5px; border-bottom: 1px solid rgba(74,63,48,0.3); }
    .gen-table tr.best td { color: var(--gold); }
    #progress-bar-wrap {
      background: var(--surf2); border-radius: 4px; height: 8px;
      margin-bottom: 8px; overflow: hidden; display: none;
    }
    #progress-bar { height: 100%; background: var(--gold); width: 0%; transition: width 0.2s; }
  </style>
</head>
<body>

<h1>⚔️ AI Evolution Lab</h1>
<p class="sub">Evolves AI behaviour through simulated RISK games. Persistent via localStorage.</p>

<div class="card">
  <div class="stat-grid">
    <div class="stat"><div class="stat-val" id="stat-gen">0</div><div class="stat-lbl">Generation</div></div>
    <div class="stat"><div class="stat-val" id="stat-games">0</div><div class="stat-lbl">Games Run</div></div>
    <div class="stat"><div class="stat-val" id="stat-best-score">—</div><div class="stat-lbl">Best Score</div></div>
  </div>
  <div id="progress-bar-wrap"><div id="progress-bar"></div></div>
  <div class="row">
    <button class="btn" id="btn-run-gen" onclick="runGeneration()">▶ Run Generation</button>
    <button class="btn" id="btn-run-auto" onclick="toggleAuto()">⏩ Auto-Run</button>
    <button class="btn btn-sm" onclick="exportParams()">💾 Export Params</button>
    <button class="btn btn-sm btn-danger" onclick="resetAll()">🗑 Reset</button>
  </div>
</div>

<div class="card">
  <h2>Current Best Parameters</h2>
  <div class="param-grid" id="param-display"></div>
</div>

<div class="card">
  <h2>Simulation Log</h2>
  <div class="log-box" id="log-box"></div>
</div>

<div class="card">
  <h2>Generation History</h2>
  <div style="overflow-x:auto">
    <table class="gen-table">
      <thead>
        <tr>
          <th>Gen</th><th>Winner</th><th>Score</th>
          <th>MaxAtk</th><th>MinArm</th><th>Man%</th><th>RegW</th>
          <th>WkW</th><th>FinW</th><th>BrdW</th><th>ThrW</th>
        </tr>
      </thead>
      <tbody id="history-tbody"></tbody>
    </table>
  </div>
</div>

<script src="js/boardData.js"></script>
<script src="js/GameState.js"></script>
<script src="js/gameLogic.js"></script>

<script>
// =============================================================================
// AI EVOLUTION LAB — v2
// Stage 1: Expanded PARAM_DEFS with behaviour weights
// Stage 2: Scored target selection (attack + reinforce)
// Stage 3: Big-jump mutations + survival-based scoring
// =============================================================================

var STORAGE_KEY = "risk_ai_evolution_v2";

// -----------------------------------------------------------------------------
// STAGE 1 — PARAM_DEFS with behaviour weights
// -----------------------------------------------------------------------------
var PARAM_DEFS = [
  // ── Mechanics ──────────────────────────────────────────────────
  { key: "maxAttacks",         label: "Max Attacks/Turn",      group: "Mechanics",
    def: 5,   min: 1,   max: 12,  step: 1   },
  { key: "minArmiesAtk",       label: "Min Armies to Attack",  group: "Mechanics",
    def: 4,   min: 2,   max: 8,   step: 1   },
  { key: "manChance",          label: "Manoeuvre Chance",      group: "Mechanics",
    def: 0.5, min: 0.0, max: 1.0, step: 0.1 },
  { key: "manFraction",        label: "Armies Moved (frac)",   group: "Mechanics",
    def: 0.5, min: 0.1, max: 0.9, step: 0.1 },
  { key: "atkDiceFrac",        label: "Dice Aggression",       group: "Mechanics",
    def: 1.0, min: 0.5, max: 1.0, step: 0.1 },
  // ── Strategic weights ──────────────────────────────────────────
  { key: "regionWeight",       label: "Region Completion",     group: "Strategy",
    def: 0.7, min: 0.0, max: 1.0, step: 0.1 },
  { key: "attackWeakWeight",   label: "Attack Weak Targets",   group: "Strategy",
    def: 0.7, min: 0.0, max: 1.0, step: 0.1 },
  { key: "finishPlayerWeight", label: "Finish Off Players",    group: "Strategy",
    def: 0.5, min: 0.0, max: 1.0, step: 0.1 },
  { key: "borderPressureWeight", label: "Border Pressure",     group: "Strategy",
    def: 0.6, min: 0.0, max: 1.0, step: 0.1 },
  // ── Reinforce behaviour ────────────────────────────────────────
  { key: "threatWeight",       label: "Reinforce Threatened",  group: "Reinforce",
    def: 0.6, min: 0.0, max: 1.0, step: 0.1 },
];

var DEFAULT_PARAMS = {};
PARAM_DEFS.forEach(function(d) { DEFAULT_PARAMS[d.key] = d.def; });

// -----------------------------------------------------------------------------
// EVOLUTION STATE
// -----------------------------------------------------------------------------
var evoState = {
  generation:   0,
  gamesRun:     0,
  bestParams:   cloneParams(DEFAULT_PARAMS),
  bestScore:    0,
  history:      []
};

var _autoRunning = false;
var _autoTimer   = null;
var _running     = false;

loadState();
refreshUI();

// -----------------------------------------------------------------------------
// PARAMETER HELPERS
// -----------------------------------------------------------------------------
function cloneParams(p) {
  var c = {};
  PARAM_DEFS.forEach(function(d) {
    c[d.key] = (p && p[d.key] !== undefined) ? p[d.key] : d.def;
  });
  return c;
}

// STAGE 3 — big-jump mutation (10% chance per param touched)
function mutateParams(base) {
  var m = cloneParams(base);
  var numMutations = 1 + Math.floor(Math.random() * 3);
  for (var i = 0; i < numMutations; i++) {
    var def = PARAM_DEFS[Math.floor(Math.random() * PARAM_DEFS.length)];
    var newVal;
    if (Math.random() < 0.1) {
      // Big jump — random value anywhere in range
      newVal = def.min + Math.random() * (def.max - def.min);
    } else {
      // Normal step mutation
      var delta = (Math.random() < 0.5 ? 1 : -1) * def.step;
      newVal = m[def.key] + delta;
    }
    m[def.key] = Math.round(
      Math.min(def.max, Math.max(def.min, newVal)) * 100
    ) / 100;
  }
  return m;
}

function crossoverParams(parentA, parentB) {
  var child = cloneParams(parentA);
  PARAM_DEFS.forEach(function(d) {
    if (Math.random() < 0.4) child[d.key] = parentB[d.key];
  });
  return child;
}

function paramsLabel(p) {
  return "Atk:" + p.maxAttacks + " Wk:" + p.attackWeakWeight +
         " Fin:" + p.finishPlayerWeight + " Reg:" + p.regionWeight;
}

// -----------------------------------------------------------------------------
// STAGE 2 — SCORED REINFORCE
// Picks the best territory to reinforce based on threat level and priority.
// -----------------------------------------------------------------------------
function _hlChooseBestReinforce(targets, params, houseId) {
  var state = getState();
  var best  = null;
  var bestScore = -Infinity;

  targets.forEach(function(tid) {
    var t     = state.territories[tid];
    var score = 0;

    // Threat score: how many enemy armies border this territory vs our armies
    var enemyArmies = 0;
    TERRITORIES[tid].adjacentTo.forEach(function(adj) {
      var adjT = state.territories[adj];
      if (adjT && adjT.owner !== houseId) enemyArmies += adjT.armies;
    });
    var threat = enemyArmies / (t.armies + 1);
    score += threat * params.threatWeight;

    // Region priority bonus
    if (_inPriorityRegion(houseId, tid)) {
      score += params.regionWeight;
    }

    if (score > bestScore) { bestScore = score; best = tid; }
  });

  return best || targets[Math.floor(Math.random() * targets.length)];
}

// STAGE 2 — SCORED ATTACK TARGET
function _hlChooseBestTarget(fromId, targets, params, houseId) {
  var state    = getState();
  var best     = null;
  var bestScore = -Infinity;

  targets.forEach(function(tid) {
    var t     = state.territories[tid];
    var score = 0;

    // Prefer weak targets — fewer armies = easier win
    score += (1 / (t.armies + 1)) * params.attackWeakWeight * 10;

    // Prefer finishing off nearly-eliminated players
    var owner = t.owner;
    if (owner && owner !== "neutral") {
      var remaining = Object.values(state.territories)
        .filter(function(tt) { return tt.owner === owner; }).length;
      if (remaining <= 3) score += params.finishPlayerWeight * 5;
    }

    // Prefer territories that border multiple enemy territories (pressure points)
    var enemyBorders = TERRITORIES[tid].adjacentTo.filter(function(adj) {
      return state.territories[adj] && state.territories[adj].owner !== houseId;
    }).length;
    score += enemyBorders * params.borderPressureWeight;

    // Region completion bonus
    if (_inPriorityRegion(houseId, tid)) score += params.regionWeight * 3;

    if (score > bestScore) { bestScore = score; best = tid; }
  });

  return best || targets[Math.floor(Math.random() * targets.length)];
}

// -----------------------------------------------------------------------------
// HEADLESS AI TURN
// -----------------------------------------------------------------------------
function headlessAITurn(params, onDone) {
  _hlReinforce(params, function() {
    _hlAttack(params, function() {
      _hlManoeuvre(params, function() {
        _hlDraw(onDone);
      });
    });
  });
}

function _hlReinforce(params, next) {
  // Trade all valid card sets first
  var keepGoing = true;
  while (keepGoing) {
    var player = getCurrentPlayer();
    var sets   = findAllValidCardSets(player.cards);
    if (sets.length === 0) break;
    var session = { armiesRemaining: 0 };
    var r = actionTradeCards(sets[0], session);
    if (!r.success) break;
  }

  var session = { armiesRemaining: getReinforceCount() };
  var state   = getState();
  var house   = state.players[state.currentPlayerIndex].houseId;

  // Frontline only
  var allTargets = getValidReinforceTargets();
  var frontline  = allTargets.filter(function(id) {
    return TERRITORIES[id].adjacentTo.some(function(adj) {
      return state.territories[adj] && state.territories[adj].owner !== house;
    });
  });
  var targets = frontline.length > 0 ? frontline : allTargets;

  while (session.armiesRemaining > 0) {
    if (targets.length === 0) break;
    // STAGE 2: use scored selection instead of random
    var tid = _hlChooseBestReinforce(targets, params, house);
    actionPlaceReinforcements(tid, 1, session);
    // Refresh state after each placement (armies change)
    state = getState();
  }

  var r = actionEndReinforce(session);
  if (!r.success) { next(); return; }
  next();
}

function _hlAttack(params, next) {
  var attacksLeft = Math.floor(Math.random() * (params.maxAttacks + 1));

  function _try() {
    if (attacksLeft <= 0) { actionEndAttack(); next(); return; }

    var state   = getState();
    var house   = state.players[state.currentPlayerIndex].houseId;
    var sources = getValidAttackSources().filter(function(id) {
      return state.territories[id] &&
             state.territories[id].armies >= params.minArmiesAtk;
    });
    if (sources.length === 0) { actionEndAttack(); next(); return; }

    attacksLeft--;

    // Pick source with most armies (most firepower)
    var fromId = sources.reduce(function(best, id) {
      return state.territories[id].armies > state.territories[best].armies
        ? id : best;
    });
    var fromArm = state.territories[fromId].armies;

    var allTargets = getValidAttackTargets(fromId).filter(function(id) {
      return state.territories[id] && state.territories[id].armies < fromArm;
    });
    if (allTargets.length === 0) { _try(); return; }

    // STAGE 2: scored target selection
    var toId = _hlChooseBestTarget(fromId, allTargets, params, house);

    var maxDice = getMaxAttackDice(fromId);
    var dice    = Math.max(1, Math.round(maxDice * params.atkDiceFrac));
    var result  = actionAttack(fromId, toId, dice);
    if (!result.success) { _try(); return; }

    if (result.data && result.data.conquered) {
      var s2     = getState();
      var attack = s2.activeAttack;
      if (attack) {
        var fromT   = s2.territories[attack.fromTerritoryId];
        var maxMove = fromT ? fromT.armies - 1 : dice;
        actionOccupy(maxMove);
      }
      if (getState().gameOver) { next(); return; }
    }
    _try();
  }
  _try();
}

function _hlManoeuvre(params, next) {
  function _skip() { actionEndManoeuvre(); next(); }

  if (Math.random() >= params.manChance) { _skip(); return; }

  var sources = getValidManoeuvreSources();
  if (sources.length === 0) { _skip(); return; }

  var fromId  = sources[Math.floor(Math.random() * sources.length)];
  var targets = getValidManoeuvreTargets(fromId);

  var state     = getState();
  var house     = state.players[state.currentPlayerIndex].houseId;
  var frontline = targets.filter(function(id) {
    return TERRITORIES[id].adjacentTo.some(function(adj) {
      return state.territories[adj] && state.territories[adj].owner !== house;
    });
  });
  var toTargets = frontline.length > 0 ? frontline : targets;
  if (toTargets.length === 0) { _skip(); return; }

  var toId    = toTargets[Math.floor(Math.random() * toTargets.length)];
  var fromT   = state.territories[fromId];
  var maxMove = fromT ? fromT.armies - 1 : 1;
  var count   = Math.max(1, Math.floor(maxMove * params.manFraction));

  actionManoeuvre(fromId, toId, count);
  actionEndManoeuvre();
  next();
}

function _hlDraw(onDone) {
  var state = getState();
  if (state.players[state.currentPlayerIndex].conqueredThisTurn) {
    var result = actionDrawCard();
    if (result.data && result.data.gameOver) { onDone(true); return; }
  }
  state = getState();
  if (state.gameOver) { onDone(true); return; }
  var r = actionEndTurn();
  if (r.data && r.data.gameOver) { onDone(true); return; }
  onDone(false);
}

// -----------------------------------------------------------------------------
// REGION HELPER
// -----------------------------------------------------------------------------
function _inPriorityRegion(houseId, territoryId) {
  var state  = getState();
  var result = false;
  Object.keys(REGIONS).forEach(function(rid) {
    var reg = REGIONS[rid];
    if (reg.territories.indexOf(territoryId) < 0) return;
    var owned = reg.territories.filter(function(t) {
      return state.territories[t] && state.territories[t].owner === houseId;
    }).length;
    if (owned / reg.territories.length > 0.5) result = true;
  });
  return result;
}

// -----------------------------------------------------------------------------
// STAGE 3 — SIMULATE GAME WITH SURVIVAL SCORING
// Instead of win-only, each variant earns points:
//   Win:      3 pts
//   Survival: territory% at game end (up to 2 pts)
//   Speed:    bonus for winning in fewer turns (up to 1 pt)
// This makes selection far more stable than win-count alone.
// -----------------------------------------------------------------------------
function simulateGame(variantParams) {
  var houseIds = Object.keys(HOUSES).slice(0, 5);
  var players  = houseIds.map(function(hid, i) {
    return { houseId: hid, name: "V" + i, isAI: true };
  });

  var result = startNewGame({
    mode: GAME_MODES.SKIRMISH,
    players: players,
    firstPlayerIndex: 0
  });
  if (!result.success) return { winner: null, scores: [0,0,0,0,0], turns: 0 };

  var maxTurns = 600;
  var turn     = 0;

  while (turn < maxTurns) {
    var state = getState();
    if (state.gameOver) break;

    var idx      = state.currentPlayerIndex;
    var houseId  = state.players[idx].houseId;
    var houseIdx = houseIds.indexOf(houseId);
    var params   = variantParams[houseIdx] || variantParams[0];

    var done = false;
    headlessAITurn(params, function(isOver) { done = isOver; });

    state = getState();
    if (state.gameOver || done) break;
    turn++;
  }

  // Compute survival scores from final state
  var finalState   = getState();
  var totalTerr    = Object.keys(TERRITORIES).length;
  var survivalPts  = houseIds.map(function(hid) {
    var owned = Object.values(finalState.territories)
      .filter(function(t) { return t.owner === hid; }).length;
    return (owned / totalTerr) * 2;  // 0–2 pts based on territory share
  });

  var winnerHouseId  = finalState.winner || null;
  var winnerHouseIdx = winnerHouseId ? houseIds.indexOf(winnerHouseId) : -1;

  // Speed bonus: winner gets extra 0–1 pt based on turns (fewer = better)
  var speedBonus = winnerHouseIdx >= 0
    ? Math.max(0, 1 - (turn / maxTurns))
    : 0;

  var finalScores = survivalPts.map(function(sp, i) {
    var pts = sp;
    if (i === winnerHouseIdx) pts += 3 + speedBonus;
    return pts;
  });

  return {
    winner:  winnerHouseId,
    scores:  finalScores,
    turns:   turn
  };
}

// -----------------------------------------------------------------------------
// RUN ONE GENERATION
// -----------------------------------------------------------------------------
function runGeneration() {
  if (_running) return;
  _running = true;
  setRunning(true);

  var gen        = evoState.generation + 1;
  var bestParams = evoState.bestParams;

  var mutation1 = mutateParams(bestParams);
  var mutation2 = mutateParams(bestParams);
  var crossover = crossoverParams(bestParams, mutation1);
  var explorer  = mutateParams(mutateParams(mutateParams(bestParams)));

  var variants   = [bestParams, mutation1, mutation2, crossover, explorer];
  var varLabels  = ["Control", "Mut-1", "Mut-2", "Crossover", "Explorer"];
  var cumScores  = [0, 0, 0, 0, 0];
  var winCounts  = [0, 0, 0, 0, 0];

  var GAMES_PER_GEN = 5;
  var progress = document.getElementById("progress-bar");
  var wrap     = document.getElementById("progress-bar-wrap");
  if (wrap) wrap.style.display = "block";

  _logMsg("── Generation " + gen + " ──", "info");

  var houseIds = Object.keys(HOUSES).slice(0, 5);

  for (var g = 0; g < GAMES_PER_GEN; g++) {
    var gameResult = simulateGame(variants);
    evoState.gamesRun++;

    if (gameResult.winner) {
      var wIdx = houseIds.indexOf(gameResult.winner);
      if (wIdx >= 0) winCounts[wIdx]++;
      _logMsg(
        "Game " + (g+1) + ": " + HOUSES[gameResult.winner].sigil + " " +
        varLabels[wIdx >= 0 ? wIdx : 0] + " wins in " + gameResult.turns + " turns",
        "win"
      );
    } else {
      _logMsg("Game " + (g+1) + ": turn cap (" + gameResult.turns + ")", "");
    }

    // Accumulate survival scores
    gameResult.scores.forEach(function(s, i) { cumScores[i] += s; });

    if (progress) progress.style.width = ((g+1)/GAMES_PER_GEN*100) + "%";
  }

  // Pick winner by cumulative score (STAGE 3 fix)
  var bestScore = -1;
  var winnerIdx = 0;
  cumScores.forEach(function(s, i) {
    if (s > bestScore) { bestScore = s; winnerIdx = i; }
  });

  var avgScore = bestScore / GAMES_PER_GEN;
  var newBest  = variants[winnerIdx];

  _logMsg(
    "Scores: " + cumScores.map(function(s,i) {
      return varLabels[i] + "=" + s.toFixed(1);
    }).join(" | "),
    "score"
  );

  if (avgScore >= evoState.bestScore || gen === 1) {
    evoState.bestParams = cloneParams(newBest);
    evoState.bestScore  = avgScore;
    _logMsg(
      "✓ New best: " + varLabels[winnerIdx] +
      " (score " + avgScore.toFixed(2) + ") " + paramsLabel(newBest),
      "mut"
    );
  } else {
    _logMsg("Control held (score " + avgScore.toFixed(2) + " vs best " + evoState.bestScore.toFixed(2) + ")", "");
  }

  evoState.generation = gen;
  evoState.history.push({
    gen:     gen,
    winner:  varLabels[winnerIdx],
    score:   avgScore,
    wins:    winCounts[winnerIdx],
    params:  cloneParams(newBest)
  });

  saveState();
  refreshUI();

  if (wrap) wrap.style.display = "none";
  if (progress) progress.style.width = "0%";
  _running = false;
  setRunning(false);
}

// -----------------------------------------------------------------------------
// AUTO-RUN
// -----------------------------------------------------------------------------
function toggleAuto() {
  _autoRunning = !_autoRunning;
  var btn = document.getElementById("btn-run-auto");
  if (_autoRunning) {
    if (btn) btn.textContent = "⏹ Stop Auto";
    _scheduleAuto();
  } else {
    if (btn) btn.textContent = "⏩ Auto-Run";
    if (_autoTimer) clearTimeout(_autoTimer);
  }
}

function _scheduleAuto() {
  if (!_autoRunning) return;
  _autoTimer = setTimeout(function() {
    runGeneration();
    if (_autoRunning) _scheduleAuto();
  }, 50);
}

// -----------------------------------------------------------------------------
// EXPORT
// -----------------------------------------------------------------------------
function exportParams() {
  var p   = evoState.bestParams;
  var out = "// ── Evolved AI Parameters (Gen " + evoState.generation +
            ", score " + evoState.bestScore.toFixed(2) + ") ──\n";
  out    += "var AI_PARAMS = {\n";
  PARAM_DEFS.forEach(function(d) {
    out += "  " + d.key + ": " + p[d.key] + ",   // " + d.label + "\n";
  });
  out += "};\n";
  var area = document.createElement("textarea");
  area.value = out;
  area.style.cssText = "position:fixed;top:10px;left:10px;width:80vw;height:200px;" +
    "z-index:999;background:#1a1612;color:#c9a84c;border:1px solid #c9a84c;" +
    "padding:8px;font-family:monospace;font-size:12px;border-radius:6px";
  document.body.appendChild(area);
  area.select();
  document.execCommand("copy");
  setTimeout(function() { document.body.removeChild(area); }, 5000);
  _logMsg("📋 Params copied to clipboard (visible for 5s)", "info");
}

// -----------------------------------------------------------------------------
// RESET
// -----------------------------------------------------------------------------
function resetAll() {
  if (!confirm("Reset all evolution data?")) return;
  evoState = {
    generation: 0, gamesRun: 0,
    bestParams: cloneParams(DEFAULT_PARAMS),
    bestScore: 0, history: []
  };
  saveState(); refreshUI();
  document.getElementById("log-box").innerHTML = "";
  _logMsg("Reset to default parameters.", "info");
}

// -----------------------------------------------------------------------------
// PERSISTENCE
// -----------------------------------------------------------------------------
function saveState() {
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(evoState)); }
  catch(e) { _logMsg("Save failed: " + e.message, ""); }
}

function loadState() {
  try {
    var raw = localStorage.getItem(STORAGE_KEY);
    if (!raw) return;
    var loaded = JSON.parse(raw);
    evoState.generation = loaded.generation || 0;
    evoState.gamesRun   = loaded.gamesRun   || 0;
    evoState.bestScore  = loaded.bestScore  || 0;
    evoState.history    = loaded.history    || [];
    evoState.bestParams = loaded.bestParams
      ? cloneParams(loaded.bestParams)
      : cloneParams(DEFAULT_PARAMS);
  } catch(e) { /* fresh start */ }
}

// -----------------------------------------------------------------------------
// UI
// -----------------------------------------------------------------------------
function refreshUI() {
  document.getElementById("stat-gen").textContent   = evoState.generation;
  document.getElementById("stat-games").textContent = evoState.gamesRun;
  document.getElementById("stat-best-score").textContent =
    evoState.generation > 0 ? evoState.bestScore.toFixed(2) : "—";

  var pd   = document.getElementById("param-display");
  var html = "";
  var lastGroup = null;
  PARAM_DEFS.forEach(function(d) {
    if (d.group !== lastGroup) {
      html += '<div class="param-group">' + d.group + '</div>';
      lastGroup = d.group;
    }
    html += '<div class="param-item">'
      + '<div class="param-name">' + d.label + '</div>'
      + '<div class="param-val">'  + evoState.bestParams[d.key] + '</div>'
      + '</div>';
  });
  pd.innerHTML = html;

  var tbody = document.getElementById("history-tbody");
  var rows  = "";
  evoState.history.slice().reverse().slice(0, 30).forEach(function(h) {
    var isBest = Math.abs(h.score - evoState.bestScore) < 0.01;
    rows += '<tr' + (isBest ? ' class="best"' : '') + '>'
      + '<td>' + h.gen + '</td>'
      + '<td>' + h.winner + '</td>'
      + '<td>' + (h.score ? h.score.toFixed(2) : "—") + '</td>'
      + '<td>' + h.params.maxAttacks          + '</td>'
      + '<td>' + h.params.minArmiesAtk        + '</td>'
      + '<td>' + h.params.manChance           + '</td>'
      + '<td>' + h.params.regionWeight        + '</td>'
      + '<td>' + h.params.attackWeakWeight    + '</td>'
      + '<td>' + h.params.finishPlayerWeight  + '</td>'
      + '<td>' + h.params.borderPressureWeight+ '</td>'
      + '<td>' + h.params.threatWeight        + '</td>'
      + '</tr>';
  });
  tbody.innerHTML = rows ||
    '<tr><td colspan="11" style="color:var(--muted);padding:8px">No generations yet</td></tr>';
}

function setRunning(yes) {
  document.getElementById("btn-run-gen").disabled = yes;
}

function _logMsg(msg, type) {
  var box = document.getElementById("log-box");
  var p   = document.createElement("p");
  p.textContent = msg;
  if (type === "win")   p.className = "log-win";
  if (type === "info")  p.className = "log-info";
  if (type === "mut")   p.className = "log-mut";
  if (type === "score") p.className = "log-score";
  box.insertBefore(p, box.firstChild);
}
</script>
</body>
</html>
